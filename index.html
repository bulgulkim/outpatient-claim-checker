<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>외래 실손 청구 서류 체크기</title>
    <style>
      :root {
        --bg: #f1f5f9;
        --card: #ffffff;
        --line: #e2e8f0;
        --text: #0f172a;
        --sub: #475569;
        --blue-bg: #eff6ff;
        --blue-line: #bfdbfe;
        --blue-text: #1e3a8a;
        --red-bg: #fef2f2;
        --red-line: #fecaca;
        --red-text: #991b1b;
        --amber-bg: #fffbeb;
        --amber-line: #fde68a;
        --amber-text: #92400e;
        --gray-bg: #f8fafc;
        --gray-line: #cbd5e1;
        --gray-text: #334155;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      }

      .card + .card { margin-top: 16px; }

      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 12px 0 0;
        font-size: 34px;
        line-height: 1.2;
      }

      h2 {
        margin: 0;
        font-size: 28px;
        line-height: 1.3;
      }

      h3 {
        margin: 0;
        font-size: 16px;
      }

      p {
        margin: 12px 0 0;
        line-height: 1.7;
        color: var(--sub);
      }

      .note, .box {
        margin-top: 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: #f8fafc;
      }

      .progress-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .progress-text {
        font-size: 14px;
        font-weight: 700;
        color: #64748b;
        white-space: nowrap;
      }

      .progress {
        flex: 1;
        height: 10px;
        border-radius: 999px;
        background: #e2e8f0;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        border-radius: 999px;
        background: #0f172a;
        transition: width 0.25s ease;
      }

      .question-box {
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 22px;
        background: #f8fafc;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 20px;
      }

      button, a.cta {
        width: 100%;
        border: 0;
        border-radius: 18px;
        padding: 15px 16px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn-dark {
        background: #0f172a;
        color: white;
      }

      .btn-light {
        background: white;
        color: #0f172a;
        border: 1px solid #cbd5e1;
      }

      .btn-secondary {
        margin-top: 12px;
        background: white;
        color: #334155;
        border: 1px solid #cbd5e1;
      }

      .result.ready { background: var(--blue-bg); border-color: var(--blue-line); }
      .result.incomplete { background: var(--red-bg); border-color: var(--red-line); }
      .result.recheck { background: var(--amber-bg); border-color: var(--amber-line); }
      .result.out_of_scope { background: var(--gray-bg); border-color: var(--gray-line); }

      .result.ready .badge { background: rgba(255,255,255,.85); color: var(--blue-text); }
      .result.incomplete .badge { background: rgba(255,255,255,.85); color: var(--red-text); }
      .result.recheck .badge { background: rgba(255,255,255,.85); color: var(--amber-text); }
      .result.out_of_scope .badge { background: rgba(255,255,255,.85); color: var(--gray-text); }

      .stack { display: grid; gap: 14px; margin-top: 18px; }

      .mini-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255,255,255,.85);
        padding: 16px;
      }

      ul {
        margin: 12px 0 0;
        padding: 0;
        list-style: none;
      }

      li {
        margin-top: 8px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #f8fafc;
        padding: 12px 14px;
        color: var(--sub);
        line-height: 1.6;
      }

      .link-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 18px;
      }

      .footer-btn { margin-top: 14px; }

      @media (max-width: 640px) {
        .wrap { padding: 16px; }
        h1 { font-size: 28px; }
        h2 { font-size: 24px; }
        .actions, .link-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <span class="badge" style="background:#eff6ff;color:#1d4ed8;">MVP Static Version</span>
        <h1>외래 실손 청구 서류 체크기</h1>
        <p>지금 제출 가능한지, 어떤 서류가 빠졌는지 간단히 확인합니다.</p>
        <div class="note">외래 실손 청구의 기본 서류를 확인하는 화면입니다. 최종 제출 기준은 가입 상품과 보험사 안내에 따라 달라질 수 있습니다.</div>
      </div>

      <div id="app"></div>
    </div>

    <script>
      const QUESTIONS = [
        { id: 'q1', title: '외래 진료에 대한 실손 청구가 맞습니까?', helper: '외래 실손 청구의 기본 서류만 확인합니다.' },
        { id: 'q2', title: '진료비 영수증이 있습니까?', helper: '병원에서 발급받은 진료비 영수증 보유 여부를 확인합니다.' },
        { id: 'q3', title: '진료비 세부내역서가 있습니까?', helper: '비용 항목이 적힌 세부내역서 보유 여부를 확인합니다.' },
        { id: 'q4', title: '처방전 또는 진단 관련 확인 서류가 있습니까?', helper: '예: 처방전, 질병분류기호 확인 서류 등 진료 내용을 확인할 수 있는 자료입니다.' },
        { id: 'q5', title: '약제비도 함께 청구할 예정입니까?', helper: '약국 비용까지 함께 청구할 계획인지 확인합니다.' },
        { id: 'q6', title: '약제비 영수증이 있습니까?', helper: '약제비 청구 시 약국 영수증 보유 여부를 확인합니다.', dependsOn: (answers) => answers.q5 === true },
        { id: 'q7', title: '보험사에서 추가 서류를 별도로 안내하였습니까?', helper: '앱 안내, 문자, 고객센터 안내 등으로 추가 제출 요청을 받은 경우를 말합니다.' },
      ];

      const DOC_INFO = {
        q2: { name: '진료비 영수증', reason: '기본 결제 사실을 확인하는 데 쓰입니다.', where: '병원 원무과 또는 수납 창구에서 재발급을 요청할 수 있습니다.', linkLabel: '진료비 영수증 다시 받는 방법 보기' },
        q3: { name: '진료비 세부내역서', reason: '비용 항목과 세부 내용 확인에 쓰입니다.', where: '병원 원무과에서 세부내역서 발급을 요청할 수 있습니다.', linkLabel: '세부내역서 어디서 받는지 바로 보기' },
        q4: { name: '처방전 또는 진단 관련 확인 서류', reason: '처방 내역 또는 진단 관련 정보를 확인하는 데 쓰입니다.', where: '진료과 또는 병원 원무과에서 확인 가능한 서류를 요청할 수 있습니다.', linkLabel: '처방전·진단 관련 서류 정리 보기' },
        q6: { name: '약제비 영수증', reason: '약국 결제 내역 확인에 쓰입니다.', where: '조제받은 약국에서 재발급을 요청할 수 있습니다.', linkLabel: '약제비 영수증 누락 시 준비 순서 보기' },
      };

      const state = { answers: {}, step: 0, completed: false };
      const app = document.getElementById('app');

      function visibleQuestions() {
        return QUESTIONS.filter((q) => !q.dependsOn || q.dependsOn(state.answers));
      }

      function buildMissingDocs() {
        const missing = [];
        if (state.answers.q2 === false) missing.push(DOC_INFO.q2);
        if (state.answers.q3 === false) missing.push(DOC_INFO.q3);
        if (state.answers.q4 === false) missing.push(DOC_INFO.q4);
        if (state.answers.q5 === true && state.answers.q6 === false) missing.push(DOC_INFO.q6);
        return missing;
      }

      function joinNames(items) {
        return items.map((item) => item.name).join(', ');
      }

      function buildLinks(type, missing) {
        if (type === 'incomplete') {
          const primary = missing[0];
          return [
            { label: primary?.linkLabel || '누락 서류 준비 방법 보기', href: '#' },
            { label: '실손 청구 전 서류 체크리스트 보기', href: '#' },
          ];
        }
        if (type === 'recheck') {
          return [
            { label: '보험사 추가서류 요구받았을 때 먼저 볼 글', href: '#' },
            { label: '실손 거절·보완 요청 줄이는 방법 보기', href: '#' },
          ];
        }
        if (type === 'ready') {
          return [
            { label: '제출 전 마지막 확인 항목 바로 보기', href: '#' },
            { label: '앱·온라인 청구 전에 점검할 것 보기', href: '#' },
          ];
        }
        return [
          { label: '입원 청구 기준부터 다시 보기', href: '#' },
          { label: '실손 청구 전체 흐름 정리 보기', href: '#' },
        ];
      }

      function buildChecklist(type, missing) {
        if (type === 'incomplete') {
          const checklist = ['누락된 서류가 무엇인지 먼저 확인합니다.'];
          missing.forEach((doc) => checklist.push(doc.where));
          checklist.push('서류를 다시 받은 뒤 사진 또는 파일 상태까지 점검합니다.');
          return checklist;
        }
        if (type === 'recheck') {
          return [
            '보험사 앱, 문자, 고객센터 안내 중 가장 최근 기준을 먼저 확인합니다.',
            '추가로 요구된 서류 명칭을 그대로 적어 둡니다.',
            '기본 서류와 추가 서류를 섞지 말고 구분해서 준비합니다.',
          ];
        }
        if (type === 'ready') {
          return [
            '준비된 서류가 흐리거나 잘리지 않았는지 마지막으로 확인합니다.',
            '앱 또는 온라인 제출 예정이라면 파일 상태를 먼저 점검합니다.',
            '제출 직전 보험사 기준이 바뀐 항목이 없는지 한 번 더 확인합니다.',
          ];
        }
        return [
          '현재 청구 유형이 외래인지 입원인지 다시 확인합니다.',
          '입원 청구라면 그에 맞는 서류 기준을 따로 확인합니다.',
          '현재 상황에 맞는 안내 글로 이동해 다음 흐름을 잡습니다.',
        ];
      }

      function evaluateResult() {
        if (state.answers.q1 === false) {
          const type = 'out_of_scope';
          return {
            type,
            badge: '외래 청구 범위 아님',
            title: '현재 선택한 상황은 외래 청구 기준에 해당하지 않습니다',
            description: '입력한 내용 기준으로 보면 현재 상황은 외래 실손 청구의 기본 서류 확인 범위를 벗어납니다. 이 화면은 외래 청구를 전제로 설계되어 있어, 입원 청구나 다른 유형의 청구에는 그대로 적용하기 어렵습니다.',
            detailSummary: '첫 질문에서 외래 청구 전제와 맞지 않는 선택이 확인되어 현재 결과가 나왔습니다. 즉, 서류가 부족해서가 아니라 청구 유형 자체가 이 화면의 범위를 벗어난 상태입니다.',
            nextAction: '현재 상황에 맞는 청구 유형 기준을 다시 확인한 뒤, 그 흐름에 맞는 서류 준비로 넘어가는 것이 좋습니다.',
            missing: [],
            checklist: buildChecklist(type, []),
            links: buildLinks(type, []),
          };
        }

        if (state.answers.q7 === true) {
          const type = 'recheck';
          return {
            type,
            badge: '재확인 필요',
            title: '보험사 기준 재확인 필요',
            description: '기본 서류를 어느 정도 갖추고 있더라도, 보험사에서 진단서나 추가 증빙을 별도로 안내한 경우에는 그 안내가 우선입니다. 이 경우는 서류를 단순히 많이 모으는 문제가 아니라, 보험사 기준과 정확히 맞추는 것이 핵심입니다.',
            detailSummary: '추가 서류를 별도로 안내받았다는 응답이 있어 현재 결과가 나왔습니다. 이런 경우에는 기본 서류만 준비해 제출했다가 다시 보완 요청을 받을 수 있어, 제출 전에 기준을 한 번 더 맞춰보는 것이 안전합니다.',
            nextAction: '가입 상품 약관, 보험사 앱 안내, 고객센터 안내 내용을 순서대로 다시 확인한 뒤 제출 준비를 이어가는 것이 좋습니다.',
            missing: [],
            checklist: buildChecklist(type, []),
            links: buildLinks(type, []),
          };
        }

        const missing = buildMissingDocs();
        if (missing.length > 0) {
          const type = 'incomplete';
          return {
            type,
            badge: '서류 보완 필요',
            title: '서류 보완 필요',
            description: '현재 입력한 내용으로 보면 바로 제출하기에는 서류가 일부 부족할 가능성이 있습니다. 이 상태에서 청구를 진행하면 추가 보완 요청이 생기거나, 다시 서류를 준비해야 하는 번거로움이 생길 수 있습니다.',
            detailSummary: `${joinNames(missing)} 항목이 확인되지 않아 현재 상태로는 바로 제출하기보다 먼저 서류를 보완하는 쪽이 더 안전합니다.`,
            nextAction: '누락된 서류를 먼저 채운 뒤 다시 점검하면, 제출 흐름을 훨씬 안정적으로 가져갈 수 있습니다.',
            missing,
            checklist: buildChecklist(type, missing),
            links: buildLinks(type, missing),
          };
        }

        const type = 'ready';
        const baseDocs = ['진료비 영수증', '진료비 세부내역서', '처방전 또는 진단 관련 확인 서류'];
        if (state.answers.q5 === true) baseDocs.push('약제비 영수증');
        return {
          type,
          badge: '기본 서류 기준 충족',
          title: '기본 서류 기준 충족',
          description: '현재 입력한 내용 기준으로는 외래 실손 청구에 필요한 기본 서류를 대체로 갖춘 상태입니다. 바로 제출이 가능한 흐름에 가깝지만, 실제 접수 전에는 가입 상품별 세부 기준이 달라질 수 있다는 점까지 한 번 더 점검하는 것이 좋습니다.',
          detailSummary: `${baseDocs.join(', ')} 항목이 모두 확인되어 기본 서류 흐름은 비교적 정리된 상태입니다.`,
          nextAction: '서류 상태를 마지막으로 점검하고, 보험사 제출 방식에 맞게 파일 또는 사진 형태를 정리한 뒤 진행하면 됩니다.',
          missing: [],
          checklist: buildChecklist(type, []),
          links: buildLinks(type, []),
        };
      }

      function answer(value) {
        const questions = visibleQuestions();
        const current = questions[state.step];
        state.answers[current.id] = value;

        if (current.id === 'q5' && value === false) {
          delete state.answers.q6;
        }

        const nextQuestions = visibleQuestions();
        const isLast = state.step >= nextQuestions.length - 1;
        if (isLast) {
          state.completed = true;
        } else {
          state.step += 1;
        }
        render();
      }

      function prev() {
        state.step = Math.max(state.step - 1, 0);
        render();
      }

      function restart() {
        state.answers = {};
        state.step = 0;
        state.completed = false;
        render();
      }

      function renderQuestion() {
        const questions = visibleQuestions();
        const current = questions[state.step];
        const progress = Math.min(state.step + 1, questions.length);
        const pct = (progress / questions.length) * 100;

        app.innerHTML = `
          <div class="card">
            <div class="progress-row">
              <div class="progress-text">진행률 ${progress} / ${questions.length}</div>
              <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
            </div>

            <div class="question-box">
              <h2>${current.title}</h2>
              <p>${current.helper}</p>
            </div>

            <div class="actions">
              <button class="btn-dark" id="yesBtn">예</button>
              <button class="btn-light" id="noBtn">아니오</button>
            </div>
            <button class="btn-secondary" id="prevBtn" ${state.step === 0 ? 'disabled style="opacity:.45;cursor:not-allowed;"' : ''}>이전 질문</button>
          </div>
        `;

        document.getElementById('yesBtn').onclick = () => answer(true);
        document.getElementById('noBtn').onclick = () => answer(false);
        document.getElementById('prevBtn').onclick = () => { if (state.step > 0) prev(); };
      }

      function renderResult() {
        const result = evaluateResult();
        const missingHtml = result.missing.length
          ? `
            <div class="mini-card">
              <h3>누락 가능성이 있는 서류</h3>
              <div class="stack">
                ${result.missing.map((item) => `
                  <div class="mini-card">
                    <strong>${item.name}</strong>
                    <p>왜 필요한지: ${item.reason}</p>
                    <p>어디서 받는지: ${item.where}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          `
          : '';

        app.innerHTML = `
          <div class="card result ${result.type}">
            <span class="badge">${result.badge}</span>
            <h2>${result.title}</h2>
            <p>${result.description}</p>

            <div class="mini-card">
              <h3>왜 이런 결과가 나왔는지</h3>
              <p>${result.detailSummary}</p>
            </div>

            ${missingHtml}

            <div class="mini-card">
              <h3>다음 행동</h3>
              <p>${result.nextAction}</p>
            </div>

            <div class="mini-card">
              <h3>지금 확인할 체크리스트</h3>
              <ul>
                ${result.checklist.map((item) => `<li>${item}</li>`).join('')}
              </ul>
            </div>

            <div class="link-grid">
              ${result.links.map((link) => `<a class="cta btn-light" href="${link.href}">${link.label}</a>`).join('')}
            </div>

            <button class="btn-dark footer-btn" id="restartBtn">다시 확인하기</button>
          </div>
        `;

        document.getElementById('restartBtn').onclick = restart;
      }

      function render() {
        if (state.completed) {
          renderResult();
        } else {
          renderQuestion();
        }
      }

      render();
    </script>
  </body>
</html>
