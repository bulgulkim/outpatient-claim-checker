<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>외래 실손 청구 서류 점검기</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #18212f;
      --muted: #586474;
      --line: #dbe3ee;
      --primary: #1858d6;
      --primary-soft: #eaf2ff;
      --ok: #107c41;
      --ok-soft: #eaf7f0;
      --warn: #b86a00;
      --warn-soft: #fff5e8;
      --danger: #b42318;
      --danger-soft: #fff1f0;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.65;
    }

    a { color: inherit; }

    .wrap {
      width: min(960px, calc(100% - 28px));
      margin: 32px auto 64px;
    }

    .hero {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px 24px 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(28px, 4.5vw, 42px);
      line-height: 1.18;
      letter-spacing: -0.035em;
    }

    .lead {
      margin: 0;
      font-size: 17px;
      color: var(--muted);
    }

    .notice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .notice {
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      font-size: 14px;
      color: var(--muted);
    }

    .main {
      margin-top: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-body {
      padding: 24px;
    }

    .progress-wrap {
      margin-bottom: 18px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 10px;
      border-radius: 999px;
      background: #ebf0f6;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #1e6bff 0%, #3d8bfd 100%);
      transition: width 0.25s ease;
    }

    .question-kicker {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      background: var(--primary-soft);
      padding: 7px 10px;
      border-radius: 999px;
    }

    .question-title {
      margin: 0;
      font-size: clamp(22px, 3.8vw, 30px);
      line-height: 1.3;
      letter-spacing: -0.03em;
    }

    .question-helper {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .option-list {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 18px;
      padding: 16px 16px 15px;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #bfd0ee;
      box-shadow: 0 10px 24px rgba(24, 33, 47, 0.06);
      background: #fcfdff;
    }

    .option.selected {
      border-color: var(--primary);
      background: var(--primary-soft);
      box-shadow: 0 10px 24px rgba(24, 88, 214, 0.12);
    }

    .option-title {
      display: block;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .option-desc {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 22px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, background 0.16s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-secondary {
      background: #eef3f9;
      color: #234;
    }

    .side-block + .side-block { margin-top: 14px; }

    .side-title {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .side-text,
    .side-list {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .side-list {
      padding-left: 18px;
    }

    .side-list li + li { margin-top: 8px; }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }

    .result-badge.ok { background: var(--ok-soft); color: var(--ok); }
    .result-badge.warn { background: var(--warn-soft); color: var(--warn); }
    .result-badge.danger { background: var(--danger-soft); color: var(--danger); }

    .result-title {
      margin: 0;
      font-size: clamp(26px, 4vw, 36px);
      line-height: 1.22;
      letter-spacing: -0.03em;
    }

    .result-desc {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .info-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface-soft);
      padding: 16px;
    }

    .info-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .info-card p {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
    }

    .checklist {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .check-item {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 14px 13px;
      background: #fff;
    }

    .check-rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 10px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
    }

    .check-text {
      font-size: 14px;
      color: var(--text);
    }

    .summary {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
    }

    .resource-list {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .resource-card {
      display: block;
      text-decoration: none;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .resource-card:hover {
      transform: translateY(-1px);
      border-color: #bfd0ee;
      box-shadow: 0 10px 24px rgba(24, 33, 47, 0.06);
    }

    .resource-card strong {
      display: block;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .resource-card span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .footnote {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .notice-grid,
      .result-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100%, calc(100% - 16px));
        margin-top: 16px;
        margin-bottom: 36px;
      }
      .hero,
      .panel-body { padding: 18px; }
      .check-item { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const QUESTIONS = [
      {
        id: 'claimType',
        label: '질문 1',
        title: '현재 확인하려는 청구 유형은 무엇입니까?',
        helper: '외래 실손 청구인지, 보험사 지정 서류가 있는지, 오래된 청구건인지 먼저 구분해야 합니다. (청구 유형에 따라 우선 확인 항목이 달라집니다.)',
        options: [
          { value: 'general', title: '일반 외래 실손 청구', desc: '기본 서류를 순서대로 확인하려는 경우' },
          { value: 'insurer_doc', title: '보험사 지정 서류가 있는 청구', desc: '문자·앱·고객센터에서 특정 문서명을 안내받은 경우' },
          { value: 'old', title: '오래된 청구건 또는 재발급 확인', desc: '과거 진료 서류의 보관 여부와 재발급 가능 여부가 중요한 경우' },
          { value: 'wrong_type', title: '외래 실손 외 다른 청구일 수 있음', desc: '입원·정액형 담보 등 다른 유형일 가능성이 있는 경우' }
        ]
      },
      {
        id: 'officialReceipt',
        label: '질문 2',
        title: '병원 발행 영수증이 있습니까?',
        helper: '카드 전표와 병원 공식 영수증은 동일하지 않습니다. 병원 발행 영수증 여부를 먼저 구분해야 합니다.',
        options: [
          { value: 'yes', title: '있습니다', desc: '병원명·환자명·진료일자·금액이 확인되는 영수증이 있습니다' },
          { value: 'no', title: '없습니다', desc: '카드 전표만 있거나 영수증 자체가 없는 상태입니다' }
        ]
      },
      {
        id: 'detailStatement',
        label: '질문 3',
        title: '진료비 세부산정내역서가 있습니까?',
        helper: '진료비 세부산정내역서(진료 항목, 처치 내역, 금액 구성이 적힌 문서) 제출 가능 여부를 확인해야 합니다.',
        options: [
          { value: 'yes', title: '있습니다', desc: '진료 항목과 금액 구성이 보이는 문서를 확보했습니다' },
          { value: 'no', title: '없거나 불분명합니다', desc: '현재 보유 여부가 불명확하거나 재발급 여부를 확인하지 못했습니다' }
        ]
      },
      {
        id: 'readability',
        label: '질문 4',
        title: '제출 파일의 판독성과 문서 완전성은 확보되어 있습니까?',
        helper: '판독성(글자를 식별할 수 있는 상태), 문서 완전성(항목 누락이 없는 상태), 프레임 절단, 음영 간섭, 반사광 간섭 여부를 확인해야 합니다.',
        options: [
          { value: 'good', title: '문제 없습니다', desc: '글자 식별이 가능하고 문서 일부가 잘리지 않았습니다' },
          { value: 'issue', title: '문제가 있거나 확신이 없습니다', desc: '판독성 저하, 그림자, 반사, 잘림, 누락 페이지가 있을 수 있습니다' }
        ]
      },
      {
        id: 'treatmentNature',
        label: '질문 5',
        title: '이번 방문은 치료 목적 진료로 볼 수 있습니까?',
        helper: '치료 목적 진료인지 확인성 방문인지 구분해야 합니다. (실제 치료 개입이 있었는지 확인하는 단계입니다.)',
        options: [
          { value: 'treatment', title: '치료 목적 진료입니다', desc: '처치·약 처방·치료 목적 진료로 설명할 수 있습니다' },
          { value: 'check', title: '검사 중심 또는 확인성 방문에 가깝습니다', desc: '경과 확인, 단순 검사, 상태 점검 성격이 강합니다' },
          { value: 'unclear', title: '불분명합니다', desc: '치료 목적 여부를 입증할 자료가 부족합니다' }
        ]
      },
      {
        id: 'treatmentProof',
        label: '질문 6',
        title: '상병코드 또는 치료 목적 입증 자료가 있습니까?',
        helper: '입증 자료(진단명, 상병분류기호, 치료 사유가 적힌 문서) 확보 여부를 확인해야 합니다.',
        options: [
          { value: 'yes', title: '있습니다', desc: '상병코드·진단명·치료 사유가 적힌 자료가 있습니다' },
          { value: 'no', title: '없거나 불분명합니다', desc: '처방전 외에 입증 자료가 없거나 확인하지 못했습니다' }
        ]
      },
      {
        id: 'pharmacyIncluded',
        label: '질문 7',
        title: '약국 약제비를 함께 청구할 예정입니까?',
        helper: '약국 약제비를 함께 청구하면 병원 서류와 별도로 약제비 계산서영수증을 확인해야 합니다.',
        options: [
          { value: 'yes', title: '예', desc: '병원 진료비와 약국 약제비를 함께 청구할 예정입니다' },
          { value: 'no', title: '아니오', desc: '병원 진료비만 확인하면 됩니다' }
        ]
      },
      {
        id: 'pharmacyReceipt',
        label: '질문 8',
        title: '약제비 계산서영수증이 있습니까?',
        helper: '약제비 계산서영수증(약제명, 금액, 조제 내역이 포함된 문서) 보유 여부를 확인해야 합니다.',
        options: [
          { value: 'yes', title: '있습니다', desc: '약국 서류를 함께 제출할 수 있습니다' },
          { value: 'no', title: '없거나 불분명합니다', desc: '약국 재발급 여부 또는 보관 여부를 확인해야 합니다' }
        ]
      },
      {
        id: 'insurerNamedDoc',
        label: '질문 9',
        title: '보험사가 특정 문서명을 지정했습니까?',
        helper: '문서명이 명시된 경우에는 해당 문서명과 동일한 서류를 확인해야 합니다. (유사 명칭 서류와 구분해야 합니다.)',
        options: [
          { value: 'yes', title: '예', desc: '진단서·통원확인서·특정 양식 등 문서명이 안내되었습니다' },
          { value: 'no', title: '아니오', desc: '특정 문서명 안내 없이 일반 제출 서류만 확인 중입니다' }
        ]
      },
      {
        id: 'namedDocReady',
        label: '질문 10',
        title: '지정된 문서명과 일치하는 서류를 확보했습니까?',
        helper: '해당 문서명과 동일한 서류인지, 대체 가능 여부가 있는지 확인해야 합니다.',
        options: [
          { value: 'yes', title: '확보했습니다', desc: '문서명까지 일치하는 서류를 준비했습니다' },
          { value: 'no', title: '아직 확보하지 못했습니다', desc: '유사 서류만 있거나 동일 서류가 없는 상태입니다' }
        ]
      },
      {
        id: 'autoUpload',
        label: '질문 11',
        title: '실손24 또는 보험사 앱 자동전송만으로 제출할 예정입니까?',

        options: [
          { value: 'yes', title: '예', desc: '자동전송만으로 접수를 마칠 계획입니다' },
          { value: 'no', title: '아니오', desc: '필요 시 별도 파일 업로드도 확인할 계획입니다' }
        ]
      }
    ];

    const LABELS = {
      claimType: {
        general: '일반 외래 실손 청구',
        insurer_doc: '보험사 지정 서류 청구',
        old: '오래된 청구건 또는 재발급 확인',
        wrong_type: '외래 실손 외 다른 청구 가능성'
      },
      officialReceipt: { yes: '병원 발행 영수증 있음', no: '병원 발행 영수증 없음' },
      detailStatement: { yes: '진료비 세부산정내역서 있음', no: '진료비 세부산정내역서 없음 또는 불분명' },
      readability: { good: '판독성 및 문서 완전성 확보', issue: '판독성 또는 문서 완전성 점검 필요' },

    const state = {

    function getVisibleQuestions() {
      const a = state.answers;
      return QUESTIONS.filter(function (q) {
        if (q.id === 'pharmacyReceipt') {
          return a.pharmacyIncluded === 'yes';
        }
        if (q.id === 'namedDocReady') {
          return a.insurerNamedDoc === 'yes' || a.claimType === 'insurer_doc';
        }
        return true;
      });
    }

    function getCurrentQuestion() {
      const visible = getVisibleQuestions();
      return visible[state.step] || null;
    }

    function setAnswer(questionId, value) {
      state.answers[questionId] = value;

      if (questionId === 'pharmacyIncluded' && value === 'no') {
        delete state.answers.pharmacyReceipt;
      }
      if (questionId === 'insurerNamedDoc' && value === 'no' && state.answers.claimType !== 'insurer_doc') {
        delete state.answers.namedDocReady;
      }

      const visible = getVisibleQuestions();
      const lastIndex = visible.length - 1;
      if (state.step < lastIndex) {
        state.step += 1;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        renderResult();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function goBack() {
      if (state.step > 0) {
        state.step -= 1;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function restart() {
      state.step = 0;
      state.answers = {};
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function chooseResult() {
      const a = state.answers;

      if (a.claimType === 'wrong_type') return 'wrong_type';
      if ((a.claimType === 'insurer_doc' || a.insurerNamedDoc === 'yes') && a.namedDocReady !== 'yes') return 'insurer_doc';
      if (a.treatmentNature !== 'treatment' || a.treatmentProof !== 'yes') return 'treatment';

      const missingCore = a.officialReceipt !== 'yes' || a.detailStatement !== 'yes' || a.readability !== 'good';
      const missingPharmacy = a.pharmacyIncluded === 'yes' && a.pharmacyReceipt !== 'yes';
      if (missingCore || missingPharmacy) return 'missing';

      if (a.claimType === 'old') return 'reissue';
      return 'ready';
    }

      return visible

          const text = labelMap[state.answers[q.id]] || state.answers[q.id];
          return '<span class="chip">' + escapeHtml(text) + '</span>';
        })
        .join('');
    }

                <div class="option-list">' + options + '</div>\
                <div class="actions">\
                  <button class="btn btn-secondary" type="button" id="backBtn" ' + (state.step === 0 ? 'disabled' : '') + '>이전 질문</button>\
                  <button class="btn btn-primary" type="button" id="restartBtn">처음부터 다시 확인</button>\
                </div>\
              </div>\
            </div>\
            ' + renderSidePanel() + '\
          </section>\
        </div>';

      document.querySelectorAll('.option').forEach(function (button) {
        button.addEventListener('click', function () {
          setAnswer(button.dataset.question, button.dataset.value);
        });
      });

      document.getElementById('backBtn').addEventListener('click', goBack);
      document.getElementById('restartBtn').addEventListener('click', restart);
    }

    function renderResult() {
      const key = chooseResult();
      const result = RESULT_MAP[key];
      const checklist = result.checklist.map(function (item) {
        return '<div class="check-item"><span class="check-rank">' + escapeHtml(item[0]) + '</span><div class="check-text">' + escapeHtml(item[1]) + '</div></div>';
      }).join('');

      const resources = RESOURCES.map(function (item) {
        return '<a class="resource-card" href="' + escapeHtml(item.href) + '" target="_blank" rel="noopener noreferrer">'
          + '<strong>' + escapeHtml(item.title) + '</strong>'
          + '<span>' + escapeHtml(item.desc) + '</span>'
          + '</a>';
      }).join('');

      let extraAutoUpload = '';
      if (state.answers.autoUpload === 'yes') {
        extraAutoUpload = '<div class="info-card"><h3>자동전송 확인</h3><p>실손24 또는 보험사 앱 자동전송만으로 제출이 끝나는지, 세부내역서나 추가 서류의 별도 업로드가 필요한지 다시 확인하는 것이 좋습니다.</p></div>';
      }

      document.getElementById('app').innerHTML = '\
        <div class="wrap">\
          <section class="hero">\
            <span class="eyebrow">외래 실손 청구 기준 점검 결과</span>\
            <h1>입력한 조건을 기준으로 현재 우선 확인 항목을 정리했습니다.</h1>\
            <p class="lead">결과는 참고용이며, 실제 제출 기준은 보험사 안내와 보장 내용이 우선합니다.</p>\
          </section>\
          <section class="main">\
            <div class="panel">\
              <div class="panel-body">\
                <span class="result-badge ' + result.tone + '">' + escapeHtml(result.badge) + '</span>\
                <h2 class="result-title">' + escapeHtml(result.title) + '</h2>\
                <p class="result-desc">' + escapeHtml(result.desc) + '</p>\
                <div class="result-grid">\
                  <div class="info-card"><h3>현재 판정</h3><p>' + escapeHtml(result.decision) + '</p></div>\
                  <div class="info-card"><h3>판단 근거</h3><p>' + escapeHtml(result.why) + '</p></div>\
                  <div class="info-card"><h3>지금 확인할 것</h3><p>' + escapeHtml(result.next) + '</p></div>\
                  ' + extraAutoUpload + '\
                </div>\
                <div class="checklist">' + checklist + '</div>\
                <div class="summary">' + buildSummaryChips() + '</div>\
                <div class="actions">\
                  <button class="btn btn-secondary" type="button" id="reviewBtn">이전 질문으로 돌아가기</button>\
                  <button class="btn btn-primary" type="button" id="restartBtn">처음부터 다시 확인</button>\
                </div>\
                <div class="footnote">이 도구는 외래 실손 청구 기준의 정보 정리용 화면입니다. 최종 제출 문서와 접수 가능 여부는 보험사 안내, 실제 담보 조건, 병원·약국 발급 가능 문서를 기준으로 확인해야 합니다.</div>\
              </div>\
            </div>\
            <div>\
              <div class="panel">\
                <div class="panel-body">\
                  <h3 class="side-title">관련 글</h3>\
                  <p class="side-text">현재 결과와 연결해서 확인하면 좋은 글입니다.</p>\
                  <div class="resource-list">' + resources + '</div>\
                </div>\
              </div>\
              <div class="panel" style="margin-top:14px;">\
                <div class="panel-body">\
                  <h3 class="side-title">확인 메모</h3>\
                  <ul class="side-list">\
                    <li>병원 발행 영수증과 카드 전표는 구분해야 합니다.</li>\
                    <li>진료비 세부산정내역서와 치료 목적 입증 자료는 역할이 다릅니다.</li>\
                    <li>보험사가 지정한 문서명이 있으면 일반 서류보다 우선 확인합니다.</li>\
                    <li>오래된 청구건은 보관 여부와 재발급 가능 항목부터 확인합니다.</li>\
                  </ul>\
                </div>\
              </div>\
            </div>\
          </section>\
        </div>';

      document.getElementById('restartBtn').addEventListener('click', restart);
      document.getElementById('reviewBtn').addEventListener('click', function () {
        const visible = getVisibleQuestions();
        state.step = Math.max(0, visible.length - 1);
        render();
      });
    }

    function render() {
      renderQuestion();
    }

    render();
  </script>
</body>
</html>
